services:
  postgres:
    image: postgres:16-alpine
    container_name: baisheng-erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baisheng_erp}
      POSTGRES_USER: ${POSTGRES_USER:-baisheng}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
    volumes:
      - ${POSTGRES_DATA_DIR:-./database/postgres-data}:/var/lib/postgresql/data
      - ${POSTGRES_BACKUP_DIR:-./database/backups}:/backups
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baisheng} -d ${POSTGRES_DB:-baisheng_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: baisheng-erp-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-baisheng}:${POSTGRES_PASSWORD:-change_this_password}@postgres:5432/${POSTGRES_DB:-baisheng_erp}?schema=public
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      UPLOAD_DIR: /app/storage/uploads
      EXPORT_DIR: /app/storage/exports
      API_BODY_LIMIT: ${API_BODY_LIMIT:-10mb}
      ORDER_IMPORT_UPLOAD_MAX_MB: ${ORDER_IMPORT_UPLOAD_MAX_MB:-100}
    volumes:
      - ${UPLOAD_DIR:-./storage/uploads}:/app/storage/uploads
      - ${EXPORT_DIR:-./storage/exports}:/app/storage/exports
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: baisheng-erp-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-net

networks:
  erp-net:
    driver: bridge
